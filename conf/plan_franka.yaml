# Minimale Planungs-Config für Franka Cube Stacking
# Verwendung: python plan.py --config-name plan_franka model_name=2026-02-02/10-04-17

defaults:
  - _self_
  - planner: cem

hydra:
  run:
    dir: plan_outputs/${now:%Y%m%d%H%M%S}_franka_gH${goal_H}

# Modell-Pfad (absoluter Pfad für Server)
ckpt_base_path: /home/tsp_jw/Desktop/dino_wm
model_name: null  # z.B. 2026-02-02/22-50-30
model_epoch: latest

# Planungs-Parameter
seed: 42
n_evals: 5
goal_source: 'dset'  # Ziel aus Dataset (kein Isaac Sim nötig!)
goal_H: 5
n_plot_samples: 5

debug_dset_init: false

objective:
  _target_: planning.objectives.create_objective_fn
  alpha: 0.5
  base: 2
  mode: last

# =====================================================================
# Franka-spezifische CEM-Konfiguration
# =====================================================================

# --- Per-Dimension Sigma-Skalierung ---
# Problem: action_std variiert pro Dimension:
#   x_std=0.121, y_std=0.158, z_std=0.070
#   → Bei sigma=1 (norm) wird z physisch 1.7-2.3x weniger exploriert als xy.
# Lösung: sigma_scale_z > 1 kompensiert das.
sigma_scale:
  enabled: true
  xy: 1.0
  z:  2.0    # ≈ action_std_xy / action_std_z
  g:  1.0

# --- Workspace Bounds (Weltkoordinaten → werden normalisiert) ---
# CEM-Samples auf physisch möglichen Bereich clampen.
workspace_bounds:
  enabled: true
  # 8D: [x_s, y_s, z_s, g_s, x_e, y_e, z_e, g_e]
  lower_8d: [0.05, -0.40, 0.00, 0.0, 0.05, -0.40, 0.00, 0.0]
  upper_8d: [0.80,  0.45, 0.12, 1.0, 0.80,  0.45, 0.12, 1.0]
  # z-Bounds eng: Greifer muss tief kommen (Tisch ~0.04-0.07),
  # z > 0.12 nicht nötig (greifen, nicht liften).

# --- Gripper ---
# Mask=true: Gripper-Dims eingefroren (sigma=0), CEM optimiert nur xyz.
# Gripper-Steuerung erfolgt deterministisch auf dem Client.
gripper:
  mask: true
  open_prior: true
  base_indices: [3, 7]  # g_s und g_e in 8D

# =====================================================================
# Feature-Visualisierung (während Inferenz)
# =====================================================================
# Erzeugt Feature-Maps während der Planning-Inferenz:
#   - Naive PCA: 3-Komponenten PCA über alle DINOv2 Patch-Tokens
#   - K-Means + PCA: K-Means Clustering (k=3) + Per-Cluster PCA
#   - DINO Self-Attention: CLS-Token Attention auf alle Patches
#
# Output wird in plan_outputs/<run>/features/ gespeichert.
# Achtung: Erzeugt ~50-100ms Overhead pro visualisiertem Frame!

feature_visualization:
  enabled: true                    # true = Feature-Maps erzeugen
  save_naive_pca: true              # Naive PCA Feature-Map (alle Patches)
  save_kmeans_pca: true             # K-Means Clustering + Per-Cluster PCA
  save_attention: true              # DINO Self-Attention Maps
  n_clusters: 3                     # Anzahl Cluster für K-Means
  n_heads_show: 4                   # Anzahl Attention-Heads in Visualisierung
  
  # Wann werden Visualisierungen erzeugt?
  visualize_goal: true              # Bei set_goal: Goal-Bild visualisieren
  visualize_current: true           # Bei plan/plan_all: Aktuelles Bild visualisieren
  visualize_interval: 1             # Alle N plan-Aufrufe visualisieren (1 = jeden)
                                    # Höhere Werte reduzieren Overhead, z.B. 5 = alle 5 Steps
  
  # WM-Prediction Visualisierung (benötigt Decoder im Modell!)
  visualize_wm_prediction: true     # 4er-Grid: Goal | Current | Predicted | Difference
  visualize_rollout_strip: true     # Komplettes Horizon-Rollout als Bildzeile:
                                    # | Current | t=1 | t=2 | ... | t=H | Goal |

